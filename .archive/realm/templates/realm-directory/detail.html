<!doctype html>
<html lang="en" data-theme="light" data-i18n-title="detail.title">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>Realm Directory · Agent Detail</title>
  <meta name="description" content="Detailed agent profile — capabilities, collaboration map, and example invocations." />
  <meta property="og:title" content="Realm Directory · Agent Detail" />
  <meta property="og:description" content="Detailed agent profile — capabilities, collaboration map, and example invocations." />
  <meta property="og:type" content="profile" />
  <meta property="og:site_name" content="Realm Directory" />
  <meta name="twitter:card" content="summary" />
  <meta name="theme-color" content="#0b0b0c" />
  <script>
    (function () {
      var t = null;
      try { t = localStorage.getItem('realm-theme'); } catch (e) {}
      if (!t) t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="detail">
  <a class="sr-only" href="#main" data-i18n="common.skip_to_main">Skip to main content</a>

  <header class="app-nav" role="banner">
    <div class="container app-nav__inner">
      <a href="index.html" class="app-nav__brand" data-i18n-attr="aria-label:common.nav_brand_aria">
        <span class="app-nav__brand-mark" aria-hidden="true">R</span>
        <span>Realm</span>
      </a>
      <nav class="app-nav__links" data-i18n-attr="aria-label:common.nav_primary">
        <a class="app-nav__link" href="index.html" data-i18n="common.nav_directory">Directory</a>
        <a class="app-nav__link" href="map.html" data-i18n="common.nav_map">Map</a>
        <a class="app-nav__link" href="category.html?slug=ux-design" data-i18n="common.nav_categories">Categories</a>
        <a class="app-nav__link" href="search.html" data-i18n="common.nav_search">Search</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false"
                data-i18n-attr="aria-label:common.theme_toggle_aria">
          <span aria-hidden="true">◐</span>
          <span data-theme-label>Light</span>
        </button>
        <button class="theme-toggle" type="button" data-lang-toggle aria-pressed="false">
          <span aria-hidden="true">⌘</span>
          <span data-lang-label>EN</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="container" data-detail>
    <nav class="breadcrumb" aria-label="Breadcrumb" data-breadcrumb></nav>

    <section class="detail-hero" aria-label="Agent profile" data-detail-hero></section>

    <div class="tabs" role="tablist" data-tabset data-i18n-attr="aria-label:detail.tabs_aria">
      <button class="tabs__item" role="tab" id="tab-overview" aria-controls="panel-overview" data-tab="overview" aria-selected="true" tabindex="0" data-i18n="detail.tab_overview">Overview</button>
      <button class="tabs__item" role="tab" id="tab-recipes" aria-controls="panel-recipes" data-tab="recipes" aria-selected="false" tabindex="-1" data-i18n="detail.tab_recipes">Recipes</button>
      <button class="tabs__item" role="tab" id="tab-capabilities" aria-controls="panel-capabilities" data-tab="capabilities" aria-selected="false" tabindex="-1" data-i18n="detail.tab_capabilities">Capabilities</button>
      <button class="tabs__item" role="tab" id="tab-collaboration" aria-controls="panel-collaboration" data-tab="collaboration" aria-selected="false" tabindex="-1" data-i18n="detail.tab_collaboration">Collaboration</button>
      <button class="tabs__item" role="tab" id="tab-examples" aria-controls="panel-examples" data-tab="examples" aria-selected="false" tabindex="-1" data-i18n="detail.tab_examples">Examples</button>
    </div>

    <section class="tab-panel" role="tabpanel" id="panel-overview" aria-labelledby="tab-overview" data-tab-panel="overview"></section>
    <section class="tab-panel" role="tabpanel" id="panel-recipes" aria-labelledby="tab-recipes" data-tab-panel="recipes" hidden></section>
    <section class="tab-panel" role="tabpanel" id="panel-capabilities" aria-labelledby="tab-capabilities" data-tab-panel="capabilities" hidden></section>
    <section class="tab-panel" role="tabpanel" id="panel-collaboration" aria-labelledby="tab-collaboration" data-tab-panel="collaboration" hidden></section>
    <section class="tab-panel" role="tabpanel" id="panel-examples" aria-labelledby="tab-examples" data-tab-panel="examples" hidden></section>

    <section data-related-class style="margin-top: var(--realm-spacing-2xl);" data-i18n-attr="aria-label:detail.related_class_aria"></section>
    <section data-related-aff style="margin-top: var(--realm-spacing-xl);" data-i18n-attr="aria-label:detail.related_affinity_aria"></section>
  </main>

  <noscript>
    <div style="padding: 2rem;">
      <p>This page requires JavaScript to render agent profiles dynamically from JSON data.</p>
      <p>Return to the <a href="index.html">Realm Directory</a>, or browse the raw agent data in
        <code>assets/data/agents/{name}.json</code> (replace <code>{name}</code> with the agent slug).</p>
    </div>
  </noscript>

  <!-- Inline fallback for file:// protocol when fetch is blocked -->
  <script type="application/json" id="agents-index-fallback">{}</script>
  <script>
    // Inline fallback for file:// protocol when fetch is blocked
    (function () {
      var el = document.getElementById('agents-index-fallback');
      if (!el || !window.location || window.location.protocol !== 'file:') return;
      var x = new XMLHttpRequest();
      try {
        x.open('GET', 'assets/data/agents.index.json', false);
        x.send(null);
        if (x.status === 0 || x.status === 200) el.textContent = x.responseText || '{}';
      } catch (e) {}
    })();
  </script>
  <script src="assets/app.js" defer></script>
</body>
</html>
