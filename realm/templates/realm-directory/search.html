<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realm Directory · Search</title>
  <meta name="description" content="Search and filter Realm agents by name, capability, category, class, and project affinity." />
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="search">
  <a class="sr-only" href="#main">Skip to main content</a>

  <header class="app-nav" role="banner">
    <div class="container app-nav__inner">
      <a href="index.html" class="app-nav__brand" aria-label="Realm directory home">
        <span class="app-nav__brand-mark" aria-hidden="true">R</span>
        <span>Realm</span>
      </a>
      <nav class="app-nav__links" aria-label="Primary">
        <a class="app-nav__link" href="index.html">Directory</a>
        <a class="app-nav__link" href="map.html">Map</a>
        <a class="app-nav__link" href="category.html?slug=ux-design">Categories</a>
        <a class="app-nav__link" href="search.html" aria-current="page">Search</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false"
                aria-label="Toggle light or dark theme">
          <span aria-hidden="true">◐</span>
          <span data-theme-label>Light</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="index.html">Realm</a>
      <span class="breadcrumb__sep" aria-hidden="true">›</span>
      <span class="breadcrumb__current" aria-current="page">Search</span>
    </nav>

    <section style="position: sticky; top: var(--directory-nav-height);
                    z-index: var(--core-z-raised);
                    background: var(--realm-color-surface-base);
                    padding-block: var(--realm-spacing-md);
                    margin-bottom: var(--realm-spacing-md);">
      <label class="search">
        <svg class="search__icon" width="18" height="18" viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/>
          <line x1="13.5" y1="13.5" x2="17" y2="17" stroke="currentColor" stroke-width="1.6"/>
        </svg>
        <input class="search__input" data-search-input type="search"
               placeholder="Search by name, capability, archetype…"
               aria-label="Search agents" autofocus />
        <kbd class="search__shortcut" title="Press / to focus">/</kbd>
      </label>
      <div class="cluster" style="margin-top: var(--realm-spacing-sm);">
        <span class="chip-group__legend" style="margin: 0;">Active filters</span>
        <span class="cluster" data-active-filters></span>
        <span style="margin-left: auto; color: var(--realm-color-ink-soft); font-size: var(--core-font-size-14);"
              data-count aria-live="polite">— of 30</span>
      </div>
    </section>

    <section data-results aria-live="polite"></section>
  </main>

  <noscript>
    <p style="padding: 2rem;">This search needs JavaScript. The agent fixtures live in <code>assets/data/agents/</code>.</p>
  </noscript>

  <script type="application/json" id="agents-index-fallback">{}</script>
  <script>
    (function () {
      var el = document.getElementById('agents-index-fallback');
      if (!el || !window.location || window.location.protocol !== 'file:') return;
      var x = new XMLHttpRequest();
      try {
        x.open('GET', 'assets/data/agents.index.json', false);
        x.send(null);
        if (x.status === 0 || x.status === 200) el.textContent = x.responseText || '{}';
      } catch (e) {}
    })();
  </script>
  <script src="assets/app.js"></script>
</body>
</html>
