<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realm Directory · Agent Network Map</title>
  <meta name="description" content="A network map of all Realm agents grouped by class, with collaboration links revealed on focus." />
  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body data-page="map">
  <a class="sr-only" href="#main">Skip to main content</a>

  <header class="app-nav" role="banner">
    <div class="container app-nav__inner">
      <a href="index.html" class="app-nav__brand" aria-label="Realm directory home">
        <span class="app-nav__brand-mark" aria-hidden="true">R</span>
        <span>Realm</span>
      </a>
      <nav class="app-nav__links" aria-label="Primary">
        <a class="app-nav__link" href="index.html">Directory</a>
        <a class="app-nav__link" href="map.html" aria-current="page">Map</a>
        <a class="app-nav__link" href="category.html?slug=ux-design">Categories</a>
        <a class="app-nav__link" href="search.html">Search</a>
        <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false"
                aria-label="Toggle light or dark theme">
          <span aria-hidden="true">◐</span>
          <span data-theme-label>Light</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="main" class="container">
    <section class="hero" aria-labelledby="map-title">
      <h1 class="hero__title" id="map-title">Agent Network Map</h1>
      <p class="hero__lead">
        All agents organized by class. Hover or focus a node to reveal its collaboration links —
        blue arrows are inputs, green arrows are outputs. Click to open the agent detail.
      </p>
    </section>

    <div class="map-controls">
      <span class="map-controls__count" data-map-count></span>
      <label class="map-controls__toggle">
        <input type="checkbox" data-map-show-all-edges />
        <span>Show all edges</span>
      </label>
    </div>

    <div class="map-graph-wrapper">
      <div class="map-graph" data-map-graph aria-label="Agent network map"></div>
    </div>

    <aside class="map-info" data-map-info hidden>
      <h2 class="map-info__title" data-map-info-name></h2>
      <p class="map-info__sub" data-map-info-meta></p>
      <p class="map-info__desc" data-map-info-desc></p>
      <div class="map-info__links" data-map-info-links></div>
    </aside>
  </main>

  <noscript>
    <p style="padding: 2rem;">This page needs JavaScript. The data is in <code>assets/data/agents.index.json</code>.</p>
  </noscript>

  <script type="application/json" id="agents-index-fallback">{}</script>
  <script>
    (function () {
      var el = document.getElementById('agents-index-fallback');
      if (!el || !window.location || window.location.protocol !== 'file:') return;
      var x = new XMLHttpRequest();
      try {
        x.open('GET', 'assets/data/agents.index.json', false);
        x.send(null);
        if (x.status === 0 || x.status === 200) el.textContent = x.responseText || '{}';
      } catch (e) {}
    })();
  </script>
  <script src="assets/app.js"></script>
</body>
</html>
